<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>惑星ゲーム (スイカゲーム風)</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="header" id="top-ui">
        <div class="score-board">
          <div style="display:flex; flex-direction:column; align-items:center;">
            <span class="label">SCORE</span>
            <span id="score">0</span>
          </div>
          <div style="display:flex; flex-direction:column; align-items:center; margin-left: 15px;">
            <span class="label">BEST</span>
            <span id="best-score" style="color: #ffd700; font-size: 20px; font-weight: bold;">0</span>
          </div>
        </div>
        <button id="sos-button" class="sos-btn">🆘 お助け</button>
        <div class="next-planet">
          <span class="label" style="text-align: center; width: 100%;">NEXT</span>
          <div style="display: flex; align-items: center; gap: 5px;">
            <canvas id="next-preview-canvas" width="60" height="60"></canvas>
            <div id="future-previews" style="display: flex; flex-direction: column; gap: 5px;">
              <canvas id="next-preview-canvas-2" width="30" height="30"></canvas>
              <canvas id="next-preview-canvas-3" width="30" height="30"></canvas>
            </div>
          </div>
        </div>
      </div>

      <div id="game-container">
        <!-- Matter.js Canvas -->
        <div id="ui-layer">
          <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p>Score: <span id="final-score">0</span></p>
            <div style="display:flex; gap:10px; flex-direction:column; align-items:center; margin-bottom:15px;">
              <button id="retry-btn">もう一度遊ぶ</button>
              <button id="share-btn" style="background:#1da1f2; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold; width:100%;">𝕏でシェア</button>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Modals -->
      <div id="ads-modal" class="modal hidden">
        <div class="modal-content">
          <h2>📺 お助け＆ボーナス</h2>
          <p>動画広告を視聴して、強力な効果を発動します。</p>
          <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
            <button id="watch-ad-sos-btn" class="ad-btn" style="background:#ff4b4b; color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">🆘 緊急お助けアイテム召喚</button>
            <button id="watch-ad-future-btn" class="ad-btn" style="background:#a64dff; color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">🔮 未来予知（常に3手先まで見える）</button>
            <button id="watch-ad-reroll-btn" class="ad-btn" style="background:#ffb347; color:#fff; border:none; padding:12px; border-radius:8px; font-weight:bold; cursor:pointer;">🔄 NEXTチェンジ（星を入れ替える）</button>
            <button id="cancel-ads-btn" style="background:#333; color:#fff; border:none; padding:12px; border-radius:8px; cursor:pointer;">やめる</button>
          </div>
        </div>
      </div>

      <!-- Legend Modal -->
      <div id="legend-modal" class="modal hidden">
        <div class="modal-content legend-content">
          <h2>星の図鑑</h2>
          <div id="legend-list"></div>
          <button id="close-legend">閉じる</button>
        </div>
      </div>

      <!-- Floating Buttons -->
      <div id="mute-button" title="サウンドON/OFF" class="floating-btn">🔊 BGM</div>
      <div id="info-button" title="星の図鑑" class="floating-btn">📖 図鑑</div>
      
      <!-- Banner Ad Mock for Web Preview -->
      <div id="mock-banner">AdMob Banner Mock (320x50)</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
