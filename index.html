<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>惑星ゲーム (スイカゲーム風)</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <div class="header" id="top-ui">
        <div class="score-board">
          <span class="label">SCORE</span>
          <span id="score">0</span>
        </div>
        <button id="sos-button" class="sos-btn">🆘 お助け</button>
        <div class="next-planet">
          <span class="label">NEXT</span>
          <canvas id="next-preview-canvas" width="60" height="60"></canvas>
        </div>
      </div>

      <div id="game-container">
        <!-- Matter.js Canvas -->
        <div id="ui-layer">
          <div id="game-over-screen" class="hidden">
            <h1>GAME OVER</h1>
            <p>Score: <span id="final-score">0</span></p>
            <button id="retry-btn">もう一度遊ぶ</button>
          </div>
        </div>
      </div>
      
      <!-- Modals -->
      <div id="sos-modal" class="modal hidden">
        <div class="modal-content">
          <h2>🆘 お助けアイテム召喚</h2>
          <p>短い動画広告を視聴して、強力なお助けアイテムを次に降らせますか？</p>
          <div class="modal-buttons" style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
            <button id="watch-ad-btn" style="background:#66fcf1; color:#0b0c10; border:none; padding:10px 20px; border-radius:10px; cursor:pointer; font-weight:bold;">動画を見る</button>
            <button id="cancel-sos-btn" style="background:#333; color:#fff; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">やめる</button>
          </div>
        </div>
      </div>

      <!-- Legend Modal -->
      <div id="legend-modal" class="modal hidden">
        <div class="modal-content legend-content">
          <h2>星の図鑑</h2>
          <div id="legend-list"></div>
          <button id="close-legend">閉じる</button>
        </div>
      </div>

      <!-- Floating Buttons -->
      <div id="mute-button" title="サウンドON/OFF" class="floating-btn">🔊 BGM</div>
      <div id="info-button" title="星の図鑑" class="floating-btn">📖 図鑑</div>
      
      <!-- Banner Ad Mock for Web Preview -->
      <div id="mock-banner">AdMob Banner Mock (320x50)</div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
